# ~/.ragger/ragger.ini — Per-user configuration
#
# Personal overrides. System config (/etc/ragger.ini) provides defaults.
# Only user-level settings can be changed here.
#
# If no system config exists, this file is bootstrapped with full settings
# so Ragger works standalone (single-user mode).

[user]
# mode = memory-only

[search]
# default_limit = 5
# default_min_score = 0.4

[storage]

[inference]
# Your preferred model for `ragger chat`
# Must match a pattern in one of the system's [inference.*] endpoints
# model = claude-sonnet-4-5
# model = qwen/qwen2.5-coder-14b
# model = gpt-4o
# max_tokens = 4096

[chat]
# Conversation persistence settings
# store_turns has four modes:
#   "true"      — store each turn, summarize, delete raw after expiration
#   "permanent" — store each turn, summarize, keep raw turns forever (compliance/audit)
#   "session"   — store one growing entry per session, discard on exit
#   "false"     — no raw turn storage, summaries only
# store_turns = true

# summarize_on_pause = true    # summarize after idle period
# pause_minutes = 10           # minutes of idle before pause summary
# summarize_on_quit = true     # summarize full conversation on exit

# Context sizing
# persona_pct = 25             # % of context window for persona files (default: 25)
# chars_per_token = 4.0        # approximate chars per token (default: 4.0)
# max_persona_chars = 0        # 0 = no absolute cap. Hard limit on persona chars.
# max_memory_results = 3       # memories injected per turn (default: 3)

# System ceilings (in system config, user can't override):
# - max_search_limit, max_persona_chars_limit, max_memory_results_limit

[logging]
# query_log = true

[auth]

[paths]
# normalize_home = true        # replace /Users/<you> with ~ in stored paths
