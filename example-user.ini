# ~/.ragger/ragger.ini — Per-user configuration
#
# Personal overrides. System config (/etc/ragger.ini) provides defaults.
# Only user-level settings can be changed here.
#
# If no system config exists, this file is bootstrapped with full settings
# so Ragger works standalone (single-user mode).

[user]
# mode = memory-only

[search]
# default_limit = 5
# default_min_score = 0.4

[storage]
# default_collection = memory

[inference]
# Your preferred model for `ragger chat`
# Must match a pattern in one of the system's [inference.*] endpoints
# model = claude-sonnet-4-5
# model = qwen/qwen2.5-coder-14b
# model = gpt-4o

[chat]
# Conversation persistence settings
# store_turns = true           # store each exchange as it happens
# summarize_on_pause = true    # summarize after idle period
# pause_minutes = 10           # minutes of idle before pause summary
# summarize_on_quit = true     # summarize full conversation on exit

[logging]
# query_log = true
