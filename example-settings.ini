# ~/.ragger/settings.ini — Ragger configuration
#
# Every Ragger install is per-user; this file is the single source of truth.
# It is created automatically by install.sh if missing. Edit in place.
#
# Uncommented lines are the shipped defaults. Commented lines (# ...) show
# optional settings and illustrative examples — uncomment and adjust.

# =====================================================================
# Server
# =====================================================================
[server]
socket = ~/.ragger/ragger.sock   # Unix domain socket (primary transport)
port   = 8432                     # TCP port (loopback by default)
# bind = 0.0.0.0                  # TCP bind address (empty = loopback only)

# =====================================================================
# Storage
# =====================================================================
[storage]
db_path            = ~/.ragger/memories.db
formats_dir        = ~/.ragger/formats
default_collection = memory

# =====================================================================
# Embedding
# =====================================================================
# All data in the DB must share one embedding model. Changing the model
# after first use requires 'ragger rebuild' to re-embed everything.
[embedding]
model      = all-MiniLM-L6-v2
dimensions = 384
# model_dir defaults to ~/.ragger/models/<model-name>/

# =====================================================================
# Search
# =====================================================================
[search]
default_limit     = 5
default_min_score = 0.4
bm25_enabled      = true
# Weights are ratios — don't need to sum to 1.0. "3 and 7" == "0.3 and 0.7"
bm25_weight   = 3
vector_weight = 7
bm25_k1       = 1.5
bm25_b        = 0.75
# max_search_limit = 0    # 0 = no ceiling on default_limit

# =====================================================================
# Inference
# =====================================================================
[inference]
model      =               # default model for `ragger chat`
max_tokens = 4096
# default = claude         # name of default endpoint (matches [inference.<name>])
# api_url =                # fallback URL when no endpoint matches
# api_key =                # fallback API key when no endpoint matches

# --- Inference endpoints ----------------------------------------------
# One [inference.<name>] section per service. The "models" glob decides
# which endpoint answers a given model name (first match wins).
# Format auto-detects from URL (anthropic.com → anthropic, else openai).

# [inference.claude]
# api_url = https://api.anthropic.com/v1
# api_key = sk-ant-api03-...
# models  = claude-*
# format  = anthropic

# [inference.openai]
# api_url = https://api.openai.com/v1
# api_key = sk-...
# models  = gpt-*, o1-*, o3-*
# format  = openai

# [inference.lmstudio]
# api_url     = http://localhost:1234/v1
# api_key     = lmstudio-local
# models      = qwen/*, llama/*, mistral/*
# format      = openai
# max_context = 32768

# [inference.ollama]
# api_url = http://localhost:11434/v1
# api_key =
# models  = gemma*, phi*, deepseek*
# format  = openai

# Custom formats: drop a JSON file in ~/.ragger/formats/<name>.json
# See docs/chat-payloads.md for the format schema.

# =====================================================================
# Chat
# =====================================================================
[chat]
# store_turns:
#   true       store each turn, summarize, delete raw after expiration
#   permanent  store each turn, summarize, keep raw turns forever (audit)
#   session    one growing entry per session, discard on exit
#   false      no raw storage, summaries only
# store_turns         = true
# summarize_on_pause  = true    # summarize after idle period
# pause_minutes       = 10      # idle minutes before pause summary
# summarize_on_quit   = true    # summarize full conversation on exit

# Context sizing
# persona_pct         = 25      # % of context window reserved for persona files
# chars_per_token     = 4.0     # rough chars-per-token estimate
# max_persona_chars   = 0       # 0 = no absolute cap
# max_memory_results  = 3       # memories injected per turn

# =====================================================================
# LM proxy (optional OpenAI-compatible pass-through)
# =====================================================================
[lm_proxy]
# Forward /v1/* verbatim to an upstream (no RAG augmentation).
# Lets tools that only speak OpenAI-compat share your local engine.
# url = http://localhost:1234/v1

# =====================================================================
# Web UI
# =====================================================================
[web]
# web_root =               # override bundled web/ directory

# =====================================================================
# TLS (for remote/HTTPS exposure)
# =====================================================================
[tls]
# cert =                   # path to TLS certificate chain (PEM)
# key  =                   # path to TLS private key (PEM)

# =====================================================================
# Logging
# =====================================================================
[logging]
log_dir   = ~/.ragger/logs
query_log = true
http_log  = true
mcp_log   = true

# =====================================================================
# Housekeeping
# =====================================================================
[housekeeping]
# cleanup_max_age_hours = 336   # raw-turn lifetime (default 336 = 2 weeks)
# housekeeping_interval = 60    # seconds between passes (0 disables)

# =====================================================================
# Import
# =====================================================================
[import]
minimum_chunk_size = 300

# =====================================================================
# Paths
# =====================================================================
[paths]
normalize_home = true          # replace /Users/<you> with ~ in stored paths

# =====================================================================
# Model aliases (short names → full model IDs)
# =====================================================================
[models]
# opus    = claude-opus-4
# sonnet  = claude-sonnet-4-5
# coder   = Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf
