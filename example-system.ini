# /etc/ragger.ini — Ragger Memory system configuration
#
# This file controls the daemon and sets defaults for all users.
# Per-user overrides go in ~/.ragger/ragger.ini
#
# Install with: sudo cp example-system.ini /etc/ragger.ini

[server]
host = 127.0.0.1
port = 8432
# server_name = ragger.local   # hostname for HTTP server

# Single-user mode: no system DB (/var/ragger/memories.db) is created.
# Each user's memory lives only in ~/.ragger/memories.db.
# The daemon still serves multiple users via auth tokens.
# Set to false for shared/collaborative document storage.
single_user = true

[storage]
# Common (shared) DB — used when single_user = false
# All users' shared memories merge here; personal memories stay in per-user DBs
common_db_path = /var/ragger/memories.db
default_collection = memory
formats_dir = /var/ragger/formats

[embedding]
model = all-MiniLM-L6-v2
dimensions = 384
# model_dir = /var/ragger/models

[search]
default_limit = 5
default_min_score = 0.4
# max_search_limit = 0            # 0 = no ceiling. Set to cap user's default_limit
bm25_enabled = true
; Weights are ratios — don't need to sum to 1.0. "3 and 7" = "0.3 and 0.7"
bm25_weight = 3
vector_weight = 7
bm25_k1 = 1.5
bm25_b = 0.75

[inference]
# Default model (user can override in ~/.ragger/ragger.ini)
# model = claude-sonnet-4-5
# max_tokens = 4096
# default =                    # name of default endpoint (matches [inference.<name>])
# api_url =                    # fallback URL when no endpoint matches
# api_key =                    # fallback API key when no endpoint matches

# --- Inference endpoints ---
# List the services available to users. Model name determines routing.
# Each [inference.<name>] section defines one endpoint.
# The "models" field uses glob patterns to match model names.

# [inference.claude]
# api_url = https://api.anthropic.com/v1
# api_key = sk-ant-api03-...
# models = claude-*
# format = anthropic

# [inference.openai]
# api_url = https://api.openai.com/v1
# api_key = sk-...
# models = gpt-*, o1-*, o3-*
# format = openai

# [inference.self]
# api_url = http://localhost:8433/v1
# api_key =
# models = *
# format = openai
# max_context = 32768

# [inference.lmstudio]
# api_url = http://localhost:1234/v1
# api_key = lmstudio-local
# models = qwen/*, llama/*, mistral/*
# format = openai
# max_context = 32768

# [inference.ollama]
# api_url = http://localhost:11434/v1
# api_key =
# models = gemma*, phi*, deepseek*
# format = openai

# Format auto-detects from URL (anthropic.com → anthropic, else openai).
# Override with explicit format= when needed.
# Custom formats: add ~/.ragger/formats/<name>.json or /var/ragger/formats/<name>.json

[lm_proxy]
# OpenAI-compatible pass-through: forward /v1/* requests to an upstream service.
# Clients can hit Ragger as if it were the upstream (no RAG augmentation).
# url = http://localhost:1234/v1

[web]
# web_root =                   # path to static web UI files (default: bundled web/ dir)

[tls]
# cert =                       # path to TLS certificate chain (PEM)
# key =                        # path to TLS private key (PEM)

[logging]
log_dir = /var/log/ragger
query_log = true
http_log = true
mcp_log = true

[housekeeping]
# cleanup_max_age_hours = 336  # summarize/delete raw turns older than this (default: 336 = 2 weeks)
# housekeeping_interval = 60   # seconds between housekeeping runs (0 = disabled, <10 clamped to 10)

[auth]
# Token rotation interval in minutes (default: 1440 = 24 hours)
token_rotation_minutes = 1440

[paths]
normalize_home = true

[import]
minimum_chunk_size = 300

[chat]
# Conversation persistence (users can configure in ~/.ragger/ragger.ini)
# store_turns: "true" (per-turn, summarize + delete), "permanent" (per-turn, summarize + keep forever),
#              "session" (one growing entry), or "false" (summaries only)
# store_turns = true
# summarize_on_pause = true
# pause_minutes = 10
# summarize_on_quit = true

# Context sizing defaults (users can override)
# persona_pct = 25             # % of context window for persona files
# chars_per_token = 4.0        # approximate chars per token
# max_persona_chars = 0        # 0 = no absolute cap
# max_memory_results = 3       # memories injected per turn

# System ceilings (user can't exceed these; 0 = no ceiling)
# max_search_limit = 0
# max_persona_chars_limit = 0
# max_memory_results_limit = 0

[models]
# Short aliases for model names. Maps to full model name or .gguf filename.
# opus = claude-opus-4
# sonnet = claude-sonnet-4-5
# coder = Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf
# qwen3 = Qwen_Qwen3-4B-GGUF_Qwen3-4B-Q4_K_M.gguf

# Note: For local inference, use external providers (LM Studio, Ollama, etc.)
# and point [inference.*] endpoints at them.
